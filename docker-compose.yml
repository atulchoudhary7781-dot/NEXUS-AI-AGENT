version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: nexus-backend
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LOG_LEVEL=INFO
    volumes:
      - ./backend:/app/backend
      - ./nexus_agent.db:/app/nexus_agent.db
    restart: unless-stopped
    networks:
      - nexus-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: nexus-frontend
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    depends_on:
      - backend
    volumes:
      - ./frontend:/app/frontend
    restart: unless-stopped
    networks:
      - nexus-network

networks:
  nexus-network:
    driver: bridge
